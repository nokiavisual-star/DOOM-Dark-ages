name: Build Windows Portable EXE

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MinGW-w64 cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            mingw-w64 \
            cmake \
            make \
            zip 2>/dev/null

      - name: Configure CMake
        run: |
          mkdir -p build_win64
          cd build_win64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/Toolchain-Windows-x86_64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DDARKAGES_PORTABLE=ON \
            -DDARKAGES_OPTIMIZE_T460S=ON \
            -DUSE_OPENGL=OFF \
            -DUSE_OPENAL=OFF \
            2>&1 | tee cmake_output.log || true

      - name: Build
        id: build
        continue-on-error: true
        run: |
          cd build_win64
          make -j$(nproc) 2>&1 | tee build_output.log
          exit_code=${PIPESTATUS[0]}
          echo "BUILD_EXIT_CODE=$exit_code" >> $GITHUB_ENV
          exit $exit_code

      - name: 🔥 Fix errors with DeepSeek AI
        if: failure()
        id: deepseek
        run: |
          echo "🔍 DeepSeek AI анализирует ошибку сборки..."
          
          # Получаем лог ошибки
          ERROR_LOG=$(cat build_win64/build_output.log | grep -E "error:|fatal error" | head -20)
          
          # Отправляем в DeepSeek
          RESPONSE=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEEPSEEK_API_KEY }}" \
            -d '{
              "model": "deepseek-chat",
              "messages": [
                {
                  "role": "system",
                  "content": "You are an expert C++ developer fixing compilation errors. Given the error, provide the full corrected file content with proper includes. The DOOM 3 BFG source uses paths like ../idlib/DemoFile.h. Return ONLY the fixed content."
                },
                {
                  "role": "user",
                  "content": "Fix this error:\n\n'"$ERROR_LOG"'\n\nFile: neo/renderer/Model.cpp\n\nFix the include path for idlib/DemoFile.h. Use ../idlib/DemoFile.h instead of idlib/DemoFile.h."
                }
              ]
            }')
          
          echo "$RESPONSE" > deepseek_response.json
          
          # Извлекаем код
          FIXED_CODE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content' | sed -n '/```/,/```/p' | sed '1d;$d')
          
          if [ -n "$FIXED_CODE" ]; then
            echo "✅ DeepSeek сгенерировал исправление!"
            echo "$FIXED_CODE" > fixed_code.txt
            echo "FIX_APPLIED=true" >> $GITHUB_ENV
          else
            echo "❌ DeepSeek не выдал код. Применяем стандартный фикс..."
            # Ручной фикс
            sed -i 's|#include "idlib/DemoFile.h"|#include "../idlib/DemoFile.h"|g' neo/renderer/Model.cpp
            echo "✅ Применён ручной фикс: ../idlib/DemoFile.h"
            echo "FIX_APPLIED=true" >> $GITHUB_ENV
          fi

      - name: 📤 Apply fixes and commit
        if: failure() && env.FIX_APPLIED == 'true'
        run: |
          git config user.name "DeepSeek AI Bot"
          git config user.email "deepseek-bot@github.com"
          
          # Добавляем фикс в модель
          if [ -f "fixed_code.txt" ]; then
            # Восстанавливаем полный файл из ответа DeepSeek
            cp fixed_code.txt neo/renderer/Model.cpp
            echo "✅ Применён фикс от DeepSeek"
          else
            # Используем стандартный фикс
            sed -i 's|#include "idlib/DemoFile.h"|#include "../idlib/DemoFile.h"|g' neo/renderer/Model.cpp
            echo "✅ Применён стандартный фикс"
          fi
          
          git add neo/renderer/Model.cpp
          git commit -m "🤖 DeepSeek AI: Fixed Model.cpp include path" || echo "Nothing to commit"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}

      - name: 🔄 Re-run build after fixes
        if: failure() && env.FIX_APPLIED == 'true'
        run: |
          echo "🔄 Перезапускаем сборку с исправлениями..."
          cd build_win64
          make clean
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/Toolchain-Windows-x86_64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DDARKAGES_PORTABLE=ON \
            -DDARKAGES_OPTIMIZE_T460S=ON \
            -DUSE_OPENGL=OFF \
            -DUSE_OPENAL=OFF
          make -j$(nproc)

      - name: Package portable build
        if: success() || (failure() && env.FIX_APPLIED == 'false')
        run: |
          mkdir -p DOOM_Dark_Ages_Portable/darkages
          mkdir -p DOOM_Dark_Ages_Portable/base

          cp build_win64/DarkAges.exe DOOM_Dark_Ages_Portable/ || echo "EXE not found!"

          for dir in cfg def fx maps materials particles renderprogs scripts strings; do
            if [ -d "darkages/$dir" ]; then
              cp -r "darkages/$dir" "DOOM_Dark_Ages_Portable/darkages/"
            fi
          done

          cp darkages/icon/darkages.ico DOOM_Dark_Ages_Portable/ 2>/dev/null || true

          if [ -d "base/renderprogs" ]; then
            cp -r base/renderprogs DOOM_Dark_Ages_Portable/base/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOOM-The-Dark-Ages-Portable-Windows-x64
          path: DOOM_Dark_Ages_Portable/
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: softprops/action-gh-release@v1
        with:
          files: DOOM_The_Dark_Ages_Portable.zip
          name: "DOOM: The Dark Ages ${{ github.ref_name }}"
          body: |
            ## DOOM: The Dark Ages - Portable Windows Build

            🔧 **Автоматически собрано с DeepSeek AI**

            ### Contents
            - `DarkAges.exe` - Standalone portable executable
            - `darkages/` - Game data files
            - `base/renderprogs/` - Render programs

            ### How to run
            1. Extract the ZIP
            2. Run `DarkAges.exe`

            ### Requirements
            - Windows 7/8/10/11 (x64)
            - No installation needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
