name: Build Windows Portable EXE

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MinGW-w64 cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            mingw-w64 \
            cmake \
            make \
            zip 2>/dev/null

      - name: Configure CMake (cross-compile for Windows x64)
        run: |
          mkdir -p build_win64
          cd build_win64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/Toolchain-Windows-x86_64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DDARKAGES_PORTABLE=ON \
            -DDARKAGES_OPTIMIZE_T460S=ON \
            -DUSE_OPENGL=OFF \
            -DUSE_OPENAL=OFF \
            2>&1 | tee cmake_output.log || true

      - name: Build
        id: build
        continue-on-error: true
        run: |
          cd build_win64
          make -j$(nproc) 2>&1 | tee build_output.log
          # Capture exit code
          exit_code=${PIPESTATUS[0]}
          echo "BUILD_EXIT_CODE=$exit_code" >> $GITHUB_ENV
          echo "BUILD_LOG<<EOF" >> $GITHUB_ENV
          cat build_output.log >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          exit $exit_code

      - name: Fix errors with DeepSeek AI
        if: failure()
        id: deepseek
        run: |
          echo "🔍 Ошибка сборки обнаружена! Отправляю в DeepSeek AI..."
          
          # Extract error lines
          ERROR_LOG=$(cat build_win64/build_output.log | grep -E "error:|fatal error" | head -50)
          
          # Send to DeepSeek API
          RESPONSE=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEEPSEEK_API_KEY }}" \
            -d '{
              "model": "deepseek-chat",
              "messages": [
                {
                  "role": "system",
                  "content": "You are an expert C++ developer. Fix compilation errors in the DOOM 3 BFG source code. Return ONLY the fixed code as a diff or full file content."
                },
                {
                  "role": "user",
                  "content": "Fix these compilation errors:\n\n'"$ERROR_LOG"'\n\nRepo: https://github.com/${{ github.repository }}\nBranch: ${{ github.ref_name }}\n\nProvide the fixed file content."
                }
              ]
            }')
          
          echo "$RESPONSE" > deepseek_response.json
          
          # Extract code from response
          FIXED_CODE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content' | sed -n '/```/,/```/p' | sed '1d;$d')
          
          if [ -n "$FIXED_CODE" ]; then
            echo "✅ Получен исправленный код!"
            echo "$FIXED_CODE" > fixed_code.txt
            echo "FIXED_CODE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "❌ Не удалось получить исправленный код."
            echo "FIXED_CODE_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Apply fixes and commit
        if: failure() && env.FIXED_CODE_EXISTS == 'true'
        run: |
          # Определяем, какой файл исправлять
          if grep -q "snd_local.h" build_win64/build_output.log; then
            echo "$FIXED_CODE" > neo/sound/snd_local.h
            echo "✅ Исправлен snd_local.h"
          elif grep -q "BinaryImage.cpp" build_win64/build_output.log; then
            echo "$FIXED_CODE" > neo/renderer/BinaryImage.cpp
            echo "✅ Исправлен BinaryImage.cpp"
          elif grep -q "Model.cpp" build_win64/build_output.log; then
            echo "$FIXED_CODE" > neo/renderer/Model.cpp
            echo "✅ Исправлен Model.cpp"
          else
            echo "⚠️ Неизвестный файл с ошибкой. Исправляем все .cpp файлы..."
            # Просто добавляем инклюд везде для теста
            find neo/ -name "*.cpp" -exec sed -i '1i#include "idlib/DemoFile.h"' {} \;
          fi
          
          git config user.name "DeepSeek AI Bot"
          git config user.email "deepseek-bot@github.com"
          git add .
          git commit -m "🤖 AI Fixed compilation errors automatically" || echo "Nothing to commit"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }} || echo "Push failed"

      - name: Re-run build after fixes
        if: failure() && env.FIXED_CODE_EXISTS == 'true'
        run: |
          # Retry build
          cd build_win64
          make clean
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/Toolchain-Windows-x86_64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DDARKAGES_PORTABLE=ON \
            -DDARKAGES_OPTIMIZE_T460S=ON \
            -DUSE_OPENGL=OFF \
            -DUSE_OPENAL=OFF
          make -j$(nproc)

      - name: Package portable build
        if: success() || (failure() && env.FIXED_CODE_EXISTS == 'false')
        run: |
          mkdir -p DOOM_Dark_Ages_Portable/darkages
          mkdir -p DOOM_Dark_Ages_Portable/base

          cp build_win64/DarkAges.exe DOOM_Dark_Ages_Portable/ || echo "EXE not found!"

          for dir in cfg def fx maps materials particles renderprogs scripts strings; do
            if [ -d "darkages/$dir" ]; then
              cp -r "darkages/$dir" "DOOM_Dark_Ages_Portable/darkages/"
            fi
          done

          cp darkages/icon/darkages.ico DOOM_Dark_Ages_Portable/ 2>/dev/null || true

          if [ -d "base/renderprogs" ]; then
            cp -r base/renderprogs DOOM_Dark_Ages_Portable/base/
          fi

          echo "=== Package contents ==="
          du -sh DOOM_Dark_Ages_Portable/
          du -sh DOOM_Dark_Ages_Portable/* 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOOM-The-Dark-Ages-Portable-Windows-x64
          path: DOOM_The_Dark_Ages_Portable/
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: softprops/action-gh-release@v1
        with:
          files: DOOM-The-Dark-Ages-Portable-Windows-x64.zip
          name: "DOOM: The Dark Ages ${{ github.ref_name }}"
          body: |
            ## DOOM: The Dark Ages - Portable Windows Build

            **Cross-compiled** from Linux via MinGW-w64 toolchain.

            ### Contents
            - `DarkAges.exe` - Standalone portable executable (icon embedded)
            - `darkages/` - Game data files
            - `base/renderprogs/` - Render programs
            - `darkages.ico` - Game icon

            ### How to run
            1. Extract the ZIP anywhere
            2. Run `DarkAges.exe`

            ### Requirements
            - Windows 7/8/10/11 (x64)
            - No installation needed (portable)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
