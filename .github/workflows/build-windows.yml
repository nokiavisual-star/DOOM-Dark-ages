name: Build Windows Portable EXE

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MinGW-w64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mingw-w64 \
            cmake \
            make \
            zip

      - name: Configure CMake (cross-compile for Windows x64)
        run: |
          mkdir -p build_win64
          cd build_win64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/Toolchain-Windows-x86_64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DDARKAGES_PORTABLE=ON \
            -DDARKAGES_OPTIMIZE_T460S=ON \
            -DUSE_OPENGL=OFF \
            -DUSE_OPENAL=OFF

      - name: Build
        run: |
          cd build_win64
          make -j$(nproc)

      - name: Package portable build
        run: |
          mkdir -p DOOM_Dark_Ages_Portable/darkages
          mkdir -p DOOM_Dark_Ages_Portable/base

          # Copy the executable
          cp build_win64/DarkAges.exe DOOM_Dark_Ages_Portable/

          # Copy game data directories
          for dir in cfg def fx maps materials particles renderprogs scripts strings; do
            if [ -d "darkages/$dir" ]; then
              cp -r "darkages/$dir" "DOOM_Dark_Ages_Portable/darkages/"
            fi
          done

          # Copy icon
          cp darkages/icon/darkages.ico DOOM_Dark_Ages_Portable/

          # Copy render programs from base
          if [ -d "base/renderprogs" ]; then
            cp -r base/renderprogs DOOM_Dark_Ages_Portable/base/
          fi

          # Show sizes
          echo "=== Package contents ==="
          du -sh DOOM_Dark_Ages_Portable/
          du -sh DOOM_Dark_Ages_Portable/* 2>/dev/null || true
          echo ""
          echo "=== EXE size ==="
          ls -lh DOOM_Dark_Ages_Portable/DarkAges.exe

      - name: Verify size under 2GB
        run: |
          SIZE_BYTES=$(du -sb DOOM_Dark_Ages_Portable/ | cut -f1)
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "Total package size: ${SIZE_MB} MB"
          if [ "$SIZE_BYTES" -gt 2147483648 ]; then
            echo "ERROR: Package exceeds 2GB limit!"
            exit 1
          fi
          echo "OK: Package is within 2GB limit"

      - name: Create ZIP archive
        run: |
          zip -r DOOM-The-Dark-Ages-Portable.zip DOOM_Dark_Ages_Portable/
          ls -lh DOOM-The-Dark-Ages-Portable.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOOM-The-Dark-Ages-Portable-Windows-x64
          path: DOOM-The-Dark-Ages-Portable.zip
          retention-days: 30
          compression-level: 0

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: DOOM-The-Dark-Ages-Portable.zip
          name: "DOOM: The Dark Ages ${{ github.ref_name }}"
          body: |
            ## DOOM: The Dark Ages - Portable Windows Build

            **Cross-compiled** from Linux via MinGW-w64 toolchain.

            ### Contents
            - `DarkAges.exe` - Standalone portable executable (icon embedded)
            - `darkages/` - Game data files
            - `base/renderprogs/` - Render programs
            - `darkages.ico` - Game icon

            ### How to run
            1. Extract the ZIP anywhere
            2. Run `DarkAges.exe`

            ### Requirements
            - Windows 7/8/10/11 (x64)
            - No installation needed (portable)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
