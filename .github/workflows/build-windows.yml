name: Build Windows Portable EXE

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ВАЖНО: используем секрет HF_TOKEN или ваш Personal Access Token для обхода защиты пуша
          token: ${{ secrets.GITHUB_TOKEN }} 

      - name: Install MinGW-w64 cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            mingw-w64 \
            cmake \
            make \
            zip \
            jq 2>/dev/null

      - name: Configure CMake
        run: |
          mkdir -p build_win64
          cd build_win64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/Toolchain-Windows-x86_64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DDARKAGES_PORTABLE=ON \
            -DDARKAGES_OPTIMIZE_T460S=ON \
            -DUSE_OPENGL=OFF \
            -DUSE_OPENAL=OFF \
            2>&1 | tee cmake_output.log || true

      - name: Build
        id: build
        continue-on-error: true
        run: |
          cd build_win64
          make -j$(nproc) 2>&1 | tee build_output.log
          exit_code=${PIPESTATUS[0]}
          echo "BUILD_EXIT_CODE=$exit_code" >> $GITHUB_ENV
          if [ $exit_code -ne 0 ]; then
            exit 1
          fi

      - name: 🔥 Fix errors with Qwen AI (Hugging Face)
        if: failure()
        id: ai_fix
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "🔍 ИИ анализирует ошибку сборки C++..."
          
          # Берем последние 30 строк лога ошибки
          ERROR_LOG=$(tail -n 30 build_win64/build_output.log)
          
          # Безопасно кодируем текст ошибки в JSON формат, чтобы кавычки не ломали curl
          JSON_SAFE_LOG=$(echo "$ERROR_LOG" | jq -aR .)
          
          # Формируем запрос к бесплатной модели Qwen
          PROMPT="У меня упала компиляция C++ (код DOOM 3 BFG). Вот лог ошибки: $JSON_SAFE_LOG. Файл: neo/renderer/Model.cpp. Исправь пути инклудов, используй ../idlib/DemoFile.h вместо idlib/DemoFile.h. Верни ТОЛЬКО чистый исправленный код всего файла целиком внутри блока \`\`\`cpp ... \`\`\`."
          
          # Делаем запрос к бесплатному API Hugging Face
          RESPONSE=$(curl -s https://huggingface.co \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"inputs\": \"$PROMPT\", \"parameters\": {\"max_new_tokens\": 2000}}")
          
          # Извлекаем текст ответа ИИ
          AI_TEXT=$(echo "$RESPONSE" | jq -r '.[0].generated_text // .generated_text // empty')
          
          # Вырезаем из ответа только код C++
          FIXED_CODE=$(echo "$AI_TEXT" | sed -n '/```cpp/,/```/p' | sed '1d;$d')
          
          if [ -n "$FIXED_CODE" ] && [ "$FIXED_CODE" != "null" ]; then
            echo "✅ ИИ сгенерировал исправление!"
            echo "$FIXED_CODE" > fixed_code.txt
            echo "FIX_APPLIED=true" >> $GITHUB_ENV
          else
            echo "❌ ИИ не выдал чистый код. Применяем стандартный ручной фикс..."
            sed -i 's|#include "idlib/DemoFile.h"|#include "../idlib/DemoFile.h"|g' neo/renderer/Model.cpp
            echo "✅ Применён ручной фикс пути"
            echo "FIX_APPLIED=true" >> $GITHUB_ENV
          fi

      - name: 📤 Apply fixes and commit
        if: failure() && env.FIX_APPLIED == 'true'
        run: |
          git config user.name "Qwen AI Bot"
          git config user.email "qwen-bot@github.com"
          
          if [ -f "fixed_code.txt" ]; then
            cp fixed_code.txt neo/renderer/Model.cpp
            echo "✅ Применён полный файл от ИИ"
          else
            echo "⚠️ Используется ручной селективный фикс"
          fi
          
          git add neo/renderer/Model.cpp
          git commit -m "🤖 AI Fix: Fixed Model.cpp include paths" || echo "Нечего коммитить"
          
          # Пушим обратно в ту же ветку
          git push origin HEAD:${{ github.ref_name }}

      - name: 🔄 Re-run build after fixes
        if: failure() && env.FIX_APPLIED == 'true'
        run: |
          echo "🔄 Перезапускаем сборку с примененными исправлениями..."
          cd build_win64
          make clean
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/Toolchain-Windows-x86_64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DDARKAGES_PORTABLE=ON \
            -DDARKAGES_OPTIMIZE_T460S=ON \
            -DUSE_OPENGL=OFF \
            -DUSE_OPENAL=OFF
          make -j$(nproc)

      - name: Package portable build
        if: always() # Упаковываем, если в итоге сборка прошла успешно
        run: |
          if [ -f "build_win64/DarkAges.exe" ]; then
            mkdir -p DOOM_Dark_Ages_Portable/darkages
            mkdir -p DOOM_Dark_Ages_Portable/base

            cp build_win64/DarkAges.exe DOOM_Dark_Ages_Portable/

            for dir in cfg def fx maps materials particles renderprogs scripts strings; do
              if [ -d "darkages/$dir" ]; then
                cp -r "darkages/$dir" "DOOM_Dark_Ages_Portable/darkages/"
              fi
            done

            cp darkages/icon/darkages.ico DOOM_Dark_Ages_Portable/ 2>/dev/null || true

            if [ -d "base/renderprogs" ]; then
              cp -r base/renderprogs DOOM_Dark_Ages_Portable/base/
            fi
            
            echo "ZIP_READY=true" >> $GITHUB_ENV
          else
            echo "❌ Сборка не удалась даже после фиксов, EXE отсутствует."
            exit 1
          fi

      - name: Upload artifact
        if: env.ZIP_READY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: DOOM-The-Dark-Ages-Portable-Windows-x64
          path: DOOM_Dark_Ages_Portable/
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v') && env.ZIP_READY == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: DOOM_The_Dark_Ages_Portable.zip
          name: "DOOM: The Dark Ages ${{ github.ref_name }}"
          body: |
            ## DOOM: The Dark Ages - Portable Windows Build
            🔧 **Автоматически исправлено и собрано с помощью ИИ**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
